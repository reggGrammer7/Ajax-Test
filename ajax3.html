<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax 3 - External API</title>
    <style>
        .user{
            display: flex;
            background: #f4f4f4;
            padding:10px;
            margin-bottom: 10px;
        }
        .user ul{
            list-style: none;
        }
    </style>
</head>
<body>
    <button id="button">Load users</button>
    <h1>Load Github Users</h1>
<div id="Users"></div>

button

<script>
document.getElementById('button').addEventListener('click', loadUsers);

function loadUsers() {
    // 1) You must use "new" here
    var xhr = new XMLHttpRequest();

    xhr.open('GET', 'https://api.github.com/users', true);

    xhr.onload = function () {
        if (this.status === 200) {
            var users = JSON.parse(this.responseText);
            var output = '';

            for (var i in users) {
                output +=
                    '<div class="user">' +
                        '<img src="' + users[i].avatar_url + '" width="70" height="70">' +
                        '<ul>' +
                            '<li>Username: ' + users[i].login + '</li>' +
                            '<li>Profile: <a href="' + users[i].html_url + '" target="_blank">View</a></li>' +
                        '</ul>' +
                    '</div>';
            }

            document.getElementById('Users').innerHTML = output;
        }
    };

    xhr.send();
}
</script>


    </script>
</body>
</html>
